<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Mario - Pule nos Goombas!</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 40%, #A8DADC 100%);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    #score {
      position: absolute;
      top: 15px;
      left: 20px;
      font-size: 28px;
      color: white;
      text-shadow: 2px 2px 4px #000;
      z-index: 10;
    }
    #game-over {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      color: white;
      font-size: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s;
    }
    #game-over.show {
      opacity: 1;
      pointer-events: all;
    }
    #mario {
      width: 60px;
      height: 80px;
      background: url('https://i.imgur.com/2M2oG.gif') center/contain no-repeat;
      position: absolute;
      bottom: 80px;
      left: 100px;
      transition: transform 0.1s;
      image-rendering: pixelated;
    }
    .goomba {
      width: 60px;
      height: 60px;
      background: url('https://i.imgur.com/8z8z8.gif') center/contain no-repeat;
      position: absolute;
      bottom: 80px;
      image-rendering: pixelated;
    }
    .block {
      width: 60px;
      height: 60px;
      background: #8B4513;
      border: 4px solid #654321;
      position: absolute;
      bottom: 140px;
      box-sizing: border-box;
      image-rendering: pixelated;
    }
    .cloud {
      position: absolute;
      font-size: 80px;
      opacity: 0.7;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>

<div id="game-container">
  <div id="score">Pontos: 0</div>
  
  <div id="mario"></div>
  
  <div id="game-over">
    <div>GAME OVER</div>
    <div style="font-size:36px; margin:30px 0;">Pontuação: <span id="final-score">0</span></div>
    <button onclick="location.reload()" style="font-size:28px; padding:15px 40px; cursor:pointer;">
      Jogar novamente
    </button>
  </div>
</div>

<script>
const mario = document.getElementById('mario');
const scoreElement = document.getElementById('score');
const gameOverScreen = document.getElementById('game-over');
const finalScore = document.getElementById('final-score');

let score = 0;
let isJumping = false;
let gameActive = true;
let gravity = 0.7;
let velocityY = 0;
let marioX = 100;
let marioY = 80;

const keys = {};

// ------------------ Controles ------------------
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') {
    if (!isJumping && gameActive) {
      velocityY = -14;
      isJumping = true;
    }
  }
});

window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

// ------------------ Criar inimigos e blocos ------------------
function createGoomba() {
  if (!gameActive) return;
  
  const goomba = document.createElement('div');
  goomba.className = 'goomba';
  goomba.style.right = '-80px';
  goomba.style.bottom = '80px';
  
  document.getElementById('game-container').appendChild(goomba);
  
  let posX = window.innerWidth;
  
  const moveGoomba = setInterval(() => {
    if (!gameActive) {
      clearInterval(moveGoomba);
      return;
    }
    
    posX -= 4;
    goomba.style.right = (window.innerWidth - posX) + 'px';
    
    // colisão com Mario
    const marioRect = mario.getBoundingClientRect();
    const goombaRect = goomba.getBoundingClientRect();
    
    if (
      marioRect.right > goombaRect.left &&
      marioRect.left < goombaRect.right &&
      marioRect.bottom > goombaRect.top &&
      marioRect.top < goombaRect.bottom
    ) {
      if (velocityY > 0 && marioY + 40 < goombaRect.top + 20) {
        // pisou no goomba → mata inimigo
        goomba.remove();
        score += 100;
        scoreElement.textContent = `Pontos: ${score}`;
        velocityY = -10; // quique
      } else {
        // colisão lateral ou de cima → game over
        gameActive = false;
        finalScore.textContent = score;
        gameOverScreen.classList.add('show');
      }
    }
    
    if (posX < -100) {
      goomba.remove();
      clearInterval(moveGoomba);
    }
  }, 20);
}

function createBlock() {
  const block = document.createElement('div');
  block.className = 'block';
  block.style.left = Math.random() * (window.innerWidth - 200) + 100 + 'px';
  document.getElementById('game-container').appendChild(block);
  
  setTimeout(() => block.remove(), 15000);
}

// ------------------ Nuvens decorativas ------------------
function createCloud() {
  const cloud = document.createElement('div');
  cloud.className = 'cloud';
  cloud.textContent = '☁️☁️';
  cloud.style.left = Math.random() * 100 + '%';
  cloud.style.top = Math.random() * 30 + '%';
  cloud.style.fontSize = (40 + Math.random() * 60) + 'px';
  document.getElementById('game-container').appendChild(cloud);
  
  setTimeout(() => cloud.remove(), 30000);
}

// ------------------ Loop principal ------------------
function gameLoop() {
  if (!gameActive) return;

  // Movimento lateral
  if (keys['a'] || keys['arrowleft']) {
    marioX -= 6;
    mario.style.transform = 'scaleX(-1)';
  }
  if (keys['d'] || keys['arrowright']) {
    marioX += 6;
    mario.style.transform = 'scaleX(1)';
  }

  // Limites da tela
  if (marioX < 0) marioX = 0;
  if (marioX > window.innerWidth - 60) marioX = window.innerWidth - 60;

  mario.style.left = marioX + 'px';

  // Gravidade e pulo
  velocityY += gravity;
  marioY += velocityY;

  if (marioY <= 80) {
    marioY = 80;
    velocityY = 0;
    isJumping = false;
  }

  mario.style.bottom = marioY + 'px';

  requestAnimationFrame(gameLoop);
}

// ------------------ Início do jogo ------------------
setInterval(createGoomba, 2800);
setInterval(createBlock, 4500);
setInterval(createCloud, 8000);

createCloud();
createCloud();
createCloud();

gameLoop();
</script>
</body>
</html>
