<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini Mario - Jogo Jogável</title>
<style>
  body {
    margin: 0;
    background: #5C94FC;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  canvas {
    display: block;
    margin: 20px auto;
    border: 4px solid #000;
    image-rendering: pixelated;
    background: #5C94FC;
  }
  #info {
    text-align: center;
    color: white;
    font-size: 20px;
    text-shadow: 2px 2px 0 #000;
  }
</style>
</head>
<body>

<div id="info">MARIO <span id="score">000000</span>  COINS: <span id="coins">00</span></div>
<canvas id="game" width="800" height="400"></canvas>

<script>
// =============== MINI MARIO ===============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const coinsEl = document.getElementById('coins');

let score = 0;
let coins = 0;

// Física do jogador
let mario = {
  x: 100,
  y: 300,
  width: 30,
  height: 40,
  vx: 0,
  vy: 0,
  speed: 5,
  jump: -14,
  grounded: false,
  facingRight: true
};

// Gravidade
const gravity = 0.8;
const friction = 0.8;

// Plataformas (chão + algumas plataformas)
let platforms = [
  {x: 0,   y: 360, w: 800, h: 40},   // chão principal
  {x: 250, y: 280, w: 150, h: 20},
  {x: 500, y: 200, w: 120, h: 20},
  {x: 700, y: 260, w: 200, h: 20},
  {x: 50,  y: 180, w: 100, h: 20}
];

// Moedas
let coinList = [
  {x: 280, y: 240, collected: false},
  {x: 320, y: 240, collected: false},
  {x: 520, y: 160, collected: false},
  {x: 560, y: 160, collected: false},
  {x: 750, y: 220, collected: false}
];

// Inimigo simples (Goomba)
let goomba = {
  x: 600,
  y: 320,
  width: 30,
  height: 30,
  vx: -1.5
};

let keys = {};
let gameOver = false;

// Controles
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup',   e => keys[e.key] = false);

// Loop principal
function gameLoop() {
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#FF0000';
    ctx.font = '40px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
    ctx.font = '20px Arial';
    ctx.fillStyle = 'white';
    ctx.fillText('Pressione F5 para jogar novamente', canvas.width/2, canvas.height/2 + 60);
    return;
  }

  // Atualiza física
  updateMario();
  updateGoomba();

  // Desenha tudo
  draw();

  requestAnimationFrame(gameLoop);
}

function updateMario() {
  // Movimento horizontal
  mario.vx = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
    mario.vx = -mario.speed;
    mario.facingRight = false;
  }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) {
    mario.vx = mario.speed;
    mario.facingRight = true;
  }

  // Pulo
  if ((keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W']) && mario.grounded) {
    mario.vy = mario.jump;
    mario.grounded = false;
  }

  // Aplica gravidade
  mario.vy += gravity;
  mario.x += mario.vx;
  mario.y += mario.vy;

  // Colisão com plataformas
  mario.grounded = false;
  for (let p of platforms) {
    if (
      mario.x + mario.width > p.x &&
      mario.x < p.x + p.w &&
      mario.y + mario.height > p.y &&
      mario.y + mario.height - mario.vy <= p.y
    ) {
      mario.y = p.y - mario.height;
      mario.vy = 0;
      mario.grounded = true;
    }
  }

  // Limites da tela
  if (mario.x < 0) mario.x = 0;
  if (mario.x + mario.width > canvas.width) mario.x = canvas.width - mario.width;
  if (mario.y > canvas.height) {
    gameOver = true; // caiu no abismo
  }

  // Coleta de moedas
  for (let c of coinList) {
    if (!c.collected &&
        mario.x + mario.width > c.x &&
        mario.x < c.x + 20 &&
        mario.y + mario.height > c.y &&
        mario.y < c.y + 20) {
      c.collected = true;
      coins++;
      score += 100;
      coinsEl.textContent = coins.toString().padStart(2, '0');
      scoreEl.textContent = score.toString().padStart(6, '0');
    }
  }
}

function updateGoomba() {
  goomba.x += goomba.vx;

  // Inverte direção ao bater na borda ou plataforma
  if (goomba.x < 400 || goomba.x > 750) goomba.vx *= -1;

  // Colisão com Mario (simples)
  if (
    mario.x + mario.width > goomba.x &&
    mario.x < goomba.x + goomba.width &&
    mario.y + mario.height > goomba.y &&
    mario.y < goomba.y + goomba.height
  ) {
    // Se Mario estiver caindo em cima do Goomba → mata ele
    if (mario.vy > 0 && mario.y + mario.height - mario.vy < goomba.y + 10) {
      goomba.x = 1000; // remove goomba
      score += 200;
      scoreEl.textContent = score.toString().padStart(6, '0');
      mario.vy = -10; // pequeno pulo de vitória
    } else {
      gameOver = true; // Mario morreu
    }
  }
}

function draw() {
  // Céu
  ctx.fillStyle = '#5C94FC';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Nuvens simples
  ctx.fillStyle = 'white';
  ctx.fillRect(100, 80, 120, 30);
  ctx.fillRect(350, 50, 100, 25);
  ctx.fillRect(600, 110, 90, 35);

  // Plataformas (verde grama)
  ctx.fillStyle = '#0B0';
  for (let p of platforms) {
    ctx.fillRect(p.x, p.y, p.w, p.h);
    // detalhe marrom por baixo
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(p.x, p.y + p.h - 8, p.w, 8);
    ctx.fillStyle = '#0B0';
  }

  // Moedas (amarelo brilhante)
  ctx.fillStyle = '#FF0';
  for (let c of coinList) {
    if (!c.collected) {
      ctx.beginPath();
      ctx.arc(c.x + 10, c.y + 10, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#CC0';
      ctx.font = '12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('C', c.x + 10, c.y + 15);
      ctx.fillStyle = '#FF0';
    }
  }

  // Goomba (marrom com olhos)
  if (goomba.x < 1000) {
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(goomba.x, goomba.y, goomba.width, goomba.height);
    ctx.fillStyle = '#000';
    ctx.fillRect(goomba.x + 8, goomba.y + 10, 6, 8);
    ctx.fillRect(goomba.x + 18, goomba.y + 10, 6, 8);
  }

  // Mario (vermelho clássico)
  ctx.save();
  if (!mario.facingRight) {
    ctx.translate(mario.x + mario.width, mario.y);
    ctx.scale(-1, 1);
  } else {
    ctx.translate(mario.x, mario.y);
  }

  // Corpo
  ctx.fillStyle = '#E00';
  ctx.fillRect(5, 10, 20, 20);           // macacão vermelho
  ctx.fillStyle = '#00F';
  ctx.fillRect(8, 25, 14, 12);           // macacão azul

  // Cabeça / chapéu
  ctx.fillStyle = '#E00';
  ctx.fillRect(4, 0, 22, 12);            // chapéu
  ctx.fillStyle = '#FDB';
  ctx.fillRect(8, 8, 14, 12);            // rosto

  // Olhos
  ctx.fillStyle = '#000';
  ctx.fillRect(12, 10, 4, 4);

  ctx.restore();

  // Chão extra (grama)
  ctx.fillStyle = '#0B0';
  ctx.fillRect(0, 370, canvas.width, 30);
}

gameLoop();
</script>

<p style="text-align:center;color:white;margin-top:10px;">
  ← → (ou A/D) = andar  ↑ / ESPAÇO / W = pular<br>
  Colete as moedas e pise no Goomba!
</p>

</body>
</html>
